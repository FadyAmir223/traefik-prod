services:
  hello-world:
    image: crccheck/hello-world
    container_name: hello-world
    networks:
      - proxy
    restart: always
    labels:
      - traefik.enable=true
      - traefik.mode=testing # TODO: remove
      - traefik.http.routers.hello-world.rule=Host(`world.${CLIENT_DOMAIN}`)
      - traefik.http.routers.hello-world.entrypoints=https
      - traefik.http.routers.hello-world.tls=true
      - traefik.http.services.hello-world.loadbalancer.server.port=8000

  traefik:
    image: traefik:v3.7.1
    container_name: traefik
    ports:
      - 8080:8080/tcp # 80:80/tcp # TODO: replace
      - 8443:8443/tcp # 443:443/tcp # TODO: replace
      - 8443:8443/udp # 443:443/udp # TODO: replace
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/configs:/configs:ro
      - ./traefik/auth/auth.txt:/auth.txt:ro
      - ./traefik/acme.json:/acme.json:rw
      - ./traefik/logs:/logs:rw
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    networks:
      - proxy
    read_only: true
    security_opt:
      - no-new-privileges=true
    labels:
      - traefik.enable=true
      - traefik.mode=testing # TODO: remove
      - traefik.http.routers.dashboard.entrypoints=https
      - traefik.http.routers.dashboard.rule=Host(`hello.${CLIENT_DOMAIN}`)
      - traefik.http.routers.dashboard.tls=true
      - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=auth
      - traefik.http.middlewares.auth.basicauth.usersFile=/auth.txt
      - traefik.http.routers.dashboard.tls.domains[0].main=${CLIENT_DOMAIN}
      - traefik.http.routers.dashboard.tls.domains[0].sans=*.${CLIENT_DOMAIN}
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
        reservations:
          memory: 64M
          cpus: "0.1"

  traefik-dockerproxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: traefik-dockerproxy
    environment:
      - CONTAINERS=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
    networks:
      - proxy
    security_opt:
      - no-new-privileges=true
    read_only: true
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.05"

  traefik-logrotate:
    build:
      context: .
      dockerfile: ./traefik/logrotate/Dockerfile.logrotate
    container_name: traefik-logrotate
    pid: service:traefik
    volumes:
      - ./traefik/logs:/logs:rw
    read_only: true
    security_opt:
      - no-new-privileges=true
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
        reservations:
          memory: 16M
          cpus: "0.05"

networks:
  proxy:
    name: proxy
    external: true
